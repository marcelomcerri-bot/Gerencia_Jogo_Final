[build]
  command = "pnpm --filter @workspace/gestor-enf run build"
  publish = "artifacts/gestor-enf/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10"

[functions]
  node_bundler = "none"

# Room API — handled by the serverless function (must come before the SPA catch-all)
[[redirects]]
  from = "/__rooms/:roomCode/:action"
  to = "/.netlify/functions/rooms"
  status = 200
  force = true

# SPA fallback — all other paths serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
