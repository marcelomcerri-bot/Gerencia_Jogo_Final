[build]
  command = "pnpm --filter @workspace/gestor-enf run build"
  publish = "artifacts/gestor-enf/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10"

[functions]
  node_bundler = "esbuild"

# SPA fallback — all other paths serve index.html for client-side routing.
# The rooms API is served directly by the v2 function via its config.path
# ("/__rooms/:roomCode/:action") — no redirect needed, and adding one
# would overwrite context.params causing 404s.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
